# pnpm 10+ requires explicit approval before running a dependency's build
# (postinstall) script. In a non-interactive CI / Docker build an unapproved
# build script makes `pnpm install` exit 1 (ERR_PNPM_IGNORED_BUILDS) — even when
# the package is listed in onlyBuiltDependencies. We build from a pinned lockfile
# of already-trusted deps, so allow all build scripts. This keeps the Railway
# Docker build green.
dangerouslyAllowAllBuilds: true
# Don't let the same ignored-builds guard block `pnpm build` / `pnpm start`.
verifyDepsBeforeRun: false
