<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AKC">
  <!-- Dark indigo tile -->
  <rect width="64" height="64" rx="14" fill="#14182b"/>
  <!-- Warp threads — the loom motif -->
  <g stroke="#b8693f" stroke-width="1" opacity="0.28">
    <line x1="16" y1="6" x2="16" y2="58"/>
    <line x1="26" y1="6" x2="26" y2="58"/>
    <line x1="38" y1="6" x2="38" y2="58"/>
    <line x1="48" y1="6" x2="48" y2="58"/>
  </g>
  <!-- AKC monogram: K in clay, like the navbar -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="'Syne','Segoe UI',system-ui,Arial,sans-serif"
        font-weight="800" font-size="30" letter-spacing="-1.5">
    <tspan fill="#ece4d3">A</tspan><tspan fill="#d9602f">K</tspan><tspan fill="#ece4d3">C</tspan>
  </text>
</svg>
